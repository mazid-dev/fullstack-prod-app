name: CI/CD Fullstack App

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  NAMESPACE: fullstack

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubeconfig
        run: |
          mkdir -p $HOME/.kube
          cat <<EOF > $HOME/.kube/config
          ${{ secrets.KUBECONFIG_PROD }}
          EOF
      - name: Install Helm
        uses: azure/setup-helm@v3
      - name: Delete webhook (to avoid timeout)
        run: |
          kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found=true || true
      - name: Create PV for PostgreSQL (if not exists)
        run: |
          kubectl apply -f helm-chart/fullstack-app/templates/pv.yaml --ignore-not-found || true
      - name: Deploy with Helm
        run: |
          helm upgrade --install fullstack-app ./helm-chart/fullstack-app \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set frontend.image.repository=${{ secrets.DOCKER_USERNAME }}/frontend \
            --set frontend.image.tag=${{ github.sha }} \
            --set backend.image.repository=${{ secrets.DOCKER_USERNAME }}/backend \
            --set backend.image.tag=${{ github.sha }} \
            --wait --timeout 10m